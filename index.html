<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galactic Settlers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/game.css" />
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;">
    <defs>
      <symbol id="icon-wood" viewBox="0 0 24 24"><path d="M12 3L5 7v3l7 3.5L19 10V7L12 3zm0 8l-5-2.5v2.5l5 2.5 5-2.5v-2.5L12 11z"/><path d="M5 14v4l7 3 7-3v-4l-7 2-7-2z"/></symbol>
      <symbol id="icon-brick" viewBox="0 0 24 24"><path d="M2 6h4v4H2V6zm6 0h4v4H8V6zm6 0h4v4h-4V6zM2 12h4v4H2v-4zm6 0h4v4H8v-4zm6 0h4v4h-4v-4z"/></symbol>
      <symbol id="icon-sheep" viewBox="0 0 24 24"><ellipse cx="12" cy="14" rx="6" ry="5"/><ellipse cx="12" cy="10" rx="3" ry="2.5"/><path d="M9 8c0-1 1.5-2 3-2s3 1 3 2"/></symbol>
      <symbol id="icon-wheat" viewBox="0 0 24 24"><path d="M12 2v20M9 6l3-4 3 4M8 10l3-4 3 4M10 14l2-3 2 3M7 18l5-6 5 6"/></symbol>
      <symbol id="icon-ore" viewBox="0 0 24 24"><path d="M12 2L4 8l2 12h12l2-12L12 2zm0 4l4 4-1 8H9l-1-8 4-4z"/></symbol>
    </defs>
  </svg>
  <div id="app">
    <header class="game-header">
      <h1>Galactic Settlers</h1>
      <p class="game-status" id="gameStatus">Place outposts</p>
      <div class="header-actions">
        <button type="button" class="btn btn-primary" id="rollDice" disabled>Roll</button>
        <span class="dice" id="diceDisplay"><span id="die1">–</span><span id="die2">–</span></span>
        <button type="button" class="btn btn-primary" id="endTurn" style="display:none">End turn</button>
        <label class="dev-toggle"><input type="checkbox" id="devModeCheckbox" /><span>Dev</span></label>
      </div>
    </header>

    <main class="game-main">
      <aside class="panel panel-left">
        <div id="resourcesContainer" class="resources-inner"></div>
        <div id="cardPhaseContainer" class="card-phase"></div>
        <div class="build-row">
          <button type="button" class="btn btn-sm" id="buildRoad" disabled>Lane</button>
          <button type="button" class="btn btn-sm" id="buildSettlement" disabled>Post</button>
          <button type="button" class="btn btn-sm" id="buildCity" disabled>City</button>
          <button type="button" class="btn btn-sm" id="buyDevCard" disabled>Card</button>
        </div>
        <div class="trade-bank" id="tradeBankContainer">
          <div class="trade-bank-title">Bank trade (4:1)</div>
          <div class="trade-bank-row" id="trade4to1Row">
            <label>Give 4</label>
            <select id="tradeGiveRes">
              <option value="wood">Timber</option>
              <option value="brick">Alloy</option>
              <option value="sheep">Provisions</option>
              <option value="wheat">Rations</option>
              <option value="ore">Ore</option>
            </select>
            <label>Get 1</label>
            <select id="tradeGetRes">
              <option value="wood">Timber</option>
              <option value="brick">Alloy</option>
              <option value="sheep">Provisions</option>
              <option value="wheat">Rations</option>
              <option value="ore">Ore</option>
            </select>
            <button type="button" class="btn btn-sm" id="confirmBankTrade">Trade</button>
          </div>
          <div class="trade-bank-row trade-3to1" id="trade3to1Row">
            <span class="trade-bank-title">Port (3:1)</span>
            <label>Give 3</label>
            <select id="trade3GiveRes"></select>
            <label>Get 1</label>
            <select id="trade3GetRes">
              <option value="wood">Timber</option>
              <option value="brick">Alloy</option>
              <option value="sheep">Provisions</option>
              <option value="wheat">Rations</option>
              <option value="ore">Ore</option>
            </select>
            <button type="button" class="btn btn-sm" id="confirmPortTrade">Trade</button>
          </div>
        </div>
        <div id="devCardsContainer" class="dev-cards-inner"></div>
        <section class="dev-actions" id="devModeActions" style="display:none">
          <div class="dev-faction-btns" id="devFactionBtns"></div>
          <button type="button" class="btn btn-sm" id="devSkipTurn">Skip turn</button>
        </section>
      </aside>

      <div class="board-wrap">
        <svg id="board" class="board" viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
      </div>

      <aside class="panel panel-right">
        <ul id="players" class="players-list"></ul>
        <div id="logEntries" class="log"></div>
      </aside>
    </main>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
